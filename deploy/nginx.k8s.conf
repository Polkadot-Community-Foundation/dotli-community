# dot.li — in-container nginx vhost for the Kubernetes/Summit deployment.
#
# This MIRRORS the four server blocks of nginx/nginx.conf.template (the VM
# deploy path) but is adapted for running behind traefik in the cluster:
#   - listens on :80 only — TLS is terminated by traefik (cert-manager cert),
#     which forwards plaintext HTTP to this pod. No ssl_* directives here.
#   - no HTTP->HTTPS redirect block — traefik's `web` entrypoint already
#     redirects :80->:443 cluster-side.
#   - no rate-limiting — Summit (like the legacy `polkadot` env) is NOT in
#     the template's RATE_LIMITED_ENVS, so the rendered VM config also has it
#     commented out. Kept off here to match.
#   - DOMAIN is fixed to dot.li and webroots to /usr/share/nginx/html/* (baked
#     into the image), so no envsubst is needed.
#
# The dotli-* snippets are COPIED verbatim from nginx/snippets/ into
# /etc/nginx/snippets/ by the Dockerfile, so the include paths match the VM.
# Keep the server_name routing + header/CSP/sw includes in sync with the
# template when it changes upstream.
#
# Three-build architecture (identical to the VM):
#   host.dot.li    -> shared protocol host (smoldot, shared chain cache)
#   *.dot.li       -> host build (topbar, routing shell, bridge); apex too
#   *.app.dot.li   -> app build (CID from subdomain, P2P fetch, render)

# ────────────────────────────────────────────────────────────
# Health endpoint (kubelet probes). Lives on a default_server so a
# probe with no/unknown Host still gets a fast 200 without smoldot.
# ────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Anything else on an unrecognised Host: the loader shell.
    root /usr/share/nginx/html/host;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# Root domain: dot.li — landing page
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dot.li;

    root /usr/share/nginx/html/host;
    index index.html;

    location = /__preview {
        set $csp_ancestors "revx.dev stg.revx.dev http://localhost:*";
        include /etc/nginx/snippets/dotli-headers-iframeable.conf;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# App build: *.app.dot.li — CID content fetching & rendering
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name *.app.dot.li;

    set $csp_ancestors "dot.li *.dot.li *.app.dot.li";
    include /etc/nginx/snippets/dotli-headers-iframeable.conf;
    include /etc/nginx/snippets/dotli-precompressed.conf;

    root /usr/share/nginx/html/app;
    index index.html;

    include /etc/nginx/snippets/dotli-assets-iframeable.conf;
    include /etc/nginx/snippets/dotli-sw-app.conf;

    location / {
        try_files $uri /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# Shared protocol build: host.dot.li — smoldot / shared cache origin
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name host.dot.li;

    set $csp_ancestors "dot.li *.dot.li *.app.dot.li revx.dev stg.revx.dev http://localhost:*";
    include /etc/nginx/snippets/dotli-headers-iframeable.conf;
    include /etc/nginx/snippets/dotli-precompressed.conf;

    root /usr/share/nginx/html/protocol;
    index index.html;

    include /etc/nginx/snippets/dotli-assets-iframeable.conf;

    location / {
        try_files $uri /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# Host build: *.dot.li — shell with topbar, routing, bridge
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name *.dot.li;

    include /etc/nginx/snippets/dotli-headers-host.conf;
    include /etc/nginx/snippets/dotli-precompressed.conf;

    root /usr/share/nginx/html/host;

    include /etc/nginx/snippets/dotli-assets-host.conf;
    include /etc/nginx/snippets/dotli-sw-host.conf;

    location / {
        try_files $uri /index.html;
    }
}
