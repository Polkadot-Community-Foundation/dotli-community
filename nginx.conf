# dot.li NGINX Configuration
#
# This configuration serves the Universal Viewer for all *.dot.li subdomains.
# The same static HTML/JS bundle is served regardless of subdomain -
# the client-side JavaScript handles resolution.

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=dotli_limit:10m rate=10r/s;

server {
    listen 80;
    server_name dot.li;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dot.li;

    # SSL certificates (adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    root /var/www/dotli;
    index index.html;

    # Landing page at root domain
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Wildcard subdomain handler - serves Universal Viewer for all *.dot.li
server {
    listen 80;
    server_name *.dot.li;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.dot.li;

    # SSL certificates (wildcard cert required)
    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Rate limiting
    limit_req zone=dotli_limit burst=20 nodelay;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers for RPC calls from browser
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    root /var/www/dotli;

    # Static assets with longer cache — try real file first
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker — must be served from root with no cache
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # All other requests — try real file first, fall back to index.html
    # This serves the Universal Viewer for client-side routing
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "public, max-age=300";
    }
}
