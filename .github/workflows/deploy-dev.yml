name: Deploy Development
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - westend
          - dev-polkadot
          - dev-paseo
          - dev-westend
          - dev-test

concurrency:
  group: deploy-dev-${{ github.event.inputs.target }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: >-
        ${{
          github.event.inputs.target == 'westend' && 'development'
          || github.event.inputs.target
        }}
      app_env: development
    secrets: inherit
