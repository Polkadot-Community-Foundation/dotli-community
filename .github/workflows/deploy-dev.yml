name: Deploy Development

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - dotli.dev
          - paseoli.dev

concurrency:
  group: deploy-dev-${{ github.event.inputs.target }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ github.event.inputs.target == 'paseoli.dev' && 'dev-paseo' || 'dev-dot' }}
      app_env: development
    secrets: inherit
