name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bunx --bun prettier --check "**/*.{ts,tsx,md}"

      - name: Lint
        run: bunx --bun turbo run lint

      - name: Type check
        run: bunx --bun turbo run typecheck

      - name: Unit tests
        run: bunx --bun turbo run test

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: bunx --bun turbo run build:prod
        env:
          VITE_APP_ENV: ${{ inputs.app_env }}
          VITE_APP_URL: ${{ secrets.APP_URL }}
          VITE_APP_DEBUG: ${{ secrets.APP_DEBUG }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_METRICS: ${{ secrets.VITE_METRICS }}
          # Required. Must match NetworkName in packages/config/src/network.ts, comma separated.
          VITE_NETWORKS: ${{ vars.NETWORKS }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Regression guard for paritytech/dotli#463: fails the deploy if any
      # marker from the real metrics/sentry modules survives bundling.
      - name: Assert no analytics in production bundles
        if: inputs.app_env == 'production'
        run: |
          set -e
          MARKERS=(
            'dotli:sentry-uuid'
            'dot.li sentry'
            '__SENTRY_HUB__'
            'VITE_METRICS=true'
          )
          FAILED=0
          for dir in apps/host/dist apps/protocol/dist apps/sandbox/dist; do
            if [ ! -d "$dir" ]; then
              echo "::error::missing build output: $dir"
              FAILED=1
              continue
            fi
            for marker in "${MARKERS[@]}"; do
              if grep -rIl --include='*.js' -- "$marker" "$dir" >/tmp/hits 2>/dev/null && [ -s /tmp/hits ]; then
                echo "::error::found '$marker' in $dir:"
                cat /tmp/hits
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::production bundles contain analytics markers — see paritytech/dotli#463"
            exit 1
          fi
          echo "production bundles are analytics-free."

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - run: ssh-keyscan ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: make ci-deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
