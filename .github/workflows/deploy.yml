name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: parity-default
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - run: bun install --frozen-lockfile

      - run: bun run build:prod
        env:
          VITE_APP_ENV: ${{ inputs.app_env }}
          VITE_APP_URL: ${{ secrets.APP_URL }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_SENTRY_DSN_HOST: ${{ secrets.SENTRY_DSN_HOST }}
          VITE_SENTRY_DSN_SANDBOX: ${{ secrets.SENTRY_DSN_SANDBOX }}
          VITE_SENTRY_DSN_WORKER: ${{ secrets.SENTRY_DSN_WORKER }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - run: ssh-keyscan ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          # --filter='P /assets/' protects old hashed chunks from deletion
          # while still uploading new ones. Old HTML pages reference previous
          # chunk filenames, so deleting them causes "Failed to fetch
          # dynamically imported module" errors for users with cached HTML.
          rsync -avz --delete --filter='P /assets/' apps/host/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/host/
          rsync -avz --delete --filter='P /assets/' apps/sandbox/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/app/
          rsync -avz --delete --filter='P /assets/' apps/protocol/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/protocol/

      - name: Clean old assets (>7 days)
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'find ${{ secrets.DEPLOY_PATH }}/*/assets/ -type f -mtime +7 -delete 2>/dev/null || true'
