name: Performance Tests
on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - '**.md'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ── Main branch: compute and store baseline ────────────────
  baseline:
    name: Continuous Integration
    runs-on: parity-default
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Build
        run: bun run build

      - name: Run baseline perf tests
        working-directory: apps/host
        run: bun run test:perf:base || true

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: perf-baseline
          path: apps/host/tests/results/last.json
          retention-days: 90
          overwrite: true

  # ── PR: compare against main baseline ──────────────────────
  compare:
    name: Continuous Integration
    runs-on: parity-default
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Build
        run: bun run build

      # Download baseline from the latest main push
      - name: Download baseline from main
        id: baseline
        uses: dawidd6/action-download-artifact@v20
        with:
          name: perf-baseline
          workflow: perf.yml
          branch: main
          path: apps/host/tests/results
          if_no_artifact_found: warn

      - name: Rename baseline
        run: |
          if [ -f apps/host/tests/results/last.json ]; then
            mv apps/host/tests/results/last.json apps/host/tests/results/base.json
            echo "HAVE_BASE=true" >> "$GITHUB_ENV"
          else
            echo "HAVE_BASE=false" >> "$GITHUB_ENV"
            echo "::warning::No baseline found — run will be recorded without comparison"
          fi

      - name: Run PR perf tests
        working-directory: apps/host
        run: bun run test:perf || true

      - name: Generate comparison
        if: env.HAVE_BASE == 'true'
        working-directory: apps/host
        run: bun run test:perf:compare:md > /tmp/perf-comment.md || true

      - name: Generate standalone report
        if: env.HAVE_BASE != 'true'
        run: |
          cat <<'EOF' > /tmp/perf-comment.md
          ## ⚡ Performance Report

          > ⚠️ No baseline found on `main`. This PR's results are recorded but cannot be compared.
          > Merge to `main` to establish a baseline.
          EOF

      - name: Post or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/perf-comment.md', 'utf8');
            const marker = '## ⚡ Performance Report';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
