name: Automated Audit

on:
  workflow_dispatch:

jobs:
  audit:
    uses: paritytech/shannon-audits/.github/workflows/shannon-audit.yml@main
    with:
      init_commands: 'bun install && bunx --bun turbo run build'
      dev_command: 'bunx --bun turbo run build && bun scripts/preview-server.ts'
      dev_port: '5173'
    secrets:
      SHANNON_CLAUDE_TOKEN: ${{ secrets.SHANNON_CLAUDE_TOKEN }}
      SHANNON_REPORT_TOKEN: ${{ secrets.SHANNON_REPORT_TOKEN }}
