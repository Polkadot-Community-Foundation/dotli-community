name: Automated Audit

on:
  workflow_dispatch:

jobs:
  audit:
    uses: paritytech/shannon-audits/.github/workflows/shannon-audit.yml@main
    with:
      init_commands: 'bun install && bun run build'
      dev_command: 'bun run preview'
      dev_port: '5173'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
