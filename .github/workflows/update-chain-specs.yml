name: Refresh Chain Spec Checkpoints

on:
  schedule:
    - cron: '0 0 */2 * *' # Every 48 hours
  workflow_dispatch:
    inputs:
      skip_bootnode_check:
        description: 'Skip bootnode health check (keep existing bootnodes)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Chain Specs
    runs-on: parity-default

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Fetch fresh chain specs
        run: bash scripts/update-chain-specs.sh
        env:
          SKIP_BOOTNODE_CHECK: ${{ inputs.skip_bootnode_check == '' && 'true' || inputs.skip_bootnode_check }}

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/resolver/src/chain-specs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'chore: refresh chain spec checkpoints'
          body: |
            Automated 24-hourly update of Paseo relay chain spec checkpoint.

            This keeps the smoldot light client sync gap small
            instead of falling further behind on cold loads.
          branch: auto/chain-spec-update
          commit-message: 'chore: refresh chain spec checkpoints'
          delete-branch: true
          labels: dependencies

