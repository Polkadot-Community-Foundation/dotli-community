name: Deploy Production

on:
  release:
    types: [published]

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: polkadot
      app_env: production
      ref: ${{ github.event.release.tag_name }}
    secrets: inherit

  notify:
    name: Matrix Notification
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Convert release notes to HTML
        id: release_info
        env:
          BODY: ${{ github.event.release.body }}
        run: |
          NORMALIZED_BODY=$(printf '%s\n' "$BODY" | tr -d '\r')
          RAW_NOTES=$(printf '%s\n' "$NORMALIZED_BODY" | sed '/^\*\*Full Changelog\*\*:/,$d')
          FULL_CHANGELOG=$(printf '%s\n' "$NORMALIZED_BODY" | sed -n 's|^\*\*Full Changelog\*\*: \(.*\)|<b>Full Changelog:</b> \1|p')
          CHANGELOG=$(printf '%s\n' "$RAW_NOTES" | sed \
            -e '/^[[:space:]]*$/d' \
            -e 's|^## \(.*\)|<b>\1</b>|' \
            -e 's|^\* \(.*\)|• \1|' \
            -e 's|https://github.com/${{ github.repository }}/pull/\([0-9]*\)|<a href="https://github.com/${{ github.repository }}/pull/\1">#\1</a>|g' \
            -e 's|@\([a-zA-Z0-9_-]*\)|<a href="https://github.com/\1">@\1</a>|g' \
            -e 's|$|<br/>|')
          if [ -n "$FULL_CHANGELOG" ]; then
            CHANGELOG="${CHANGELOG}${FULL_CHANGELOG}<br/>"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Matrix notification
        uses: s3krit/matrix-message-action@70ad3fb812ee0e45ff8999d6af11cafad11a6ecf # v0.0.3
        with:
          room_id: ${{ vars.MATRIX_ROOM_ID }}
          access_token: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          server: ${{ vars.MATRIX_SERVER }}
          message: |
            <b>dot.li ${{ github.event.release.tag_name }} deployed to production!</b><br/>
            <br/>
            ${{ steps.release_info.outputs.changelog }}
            <b>Release:</b> ${{ github.event.release.html_url }}
