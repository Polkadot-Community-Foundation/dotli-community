name: Refresh Runtime Metadata

on:
  schedule:
    - cron: '30 3 * * 1' # Weekly on Monday 03:30 — metadata changes only on runtime upgrades
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Metadata
    runs-on: parity-default

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Update metadata
        run: npx papi update ah --skip-codegen

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet .papi/metadata/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'chore: refresh Asset Hub Paseo runtime metadata'
          body: |
            Automated weekly update of Asset Hub Paseo runtime metadata.

            This keeps the gateway resolver's SCALE codecs in sync with
            the latest runtime types (ReviveApi_call parameters/response).
          branch: auto/metadata-update
          commit-message: 'chore: refresh Asset Hub Paseo runtime metadata'
          delete-branch: true
          labels: dependencies

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --auto --squash
