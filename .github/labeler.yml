# GitHub Actions labeler configuration for dotli monorepo
# https://github.com/actions/labeler
github-actions:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

"app: host":
  - changed-files:
      - all-globs-to-any-file:
          - 'apps/host/**'
          - '!apps/host/package.json'

"app: sandbox":
  - changed-files:
      - all-globs-to-any-file:
          - 'apps/sandbox/**'
          - '!apps/sandbox/package.json'

"pkg: config":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/config/**'
          - '!packages/config/package.json'

"pkg: shared":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/shared/**'
          - '!packages/shared/package.json'

"pkg: storage":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/storage/**'
          - '!packages/storage/package.json'

"pkg: resolver":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/resolver/**'
          - '!packages/resolver/package.json'

"pkg: content":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/content/**'
          - '!packages/content/package.json'

"pkg: auth":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/auth/**'
          - '!packages/auth/package.json'

"pkg: ui":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/ui/**'
          - '!packages/ui/package.json'

"pkg: sandbox-checker":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/sandbox-checker/**'
          - '!packages/sandbox-checker/package.json'

"pkg: eslint":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/eslint-config/**'
          - '!packages/eslint-config/package.json'

"pkg: typescript":
  - changed-files:
      - all-globs-to-any-file:
          - 'packages/typescript-config/**'
          - '!packages/typescript-config/package.json'

nginx:
  - changed-files:
      - any-glob-to-any-file: 'nginx/**'
