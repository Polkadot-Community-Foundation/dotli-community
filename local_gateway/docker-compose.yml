name: dotli-local-gateway

services:
  ingress:
    image: docker.io/library/caddy:2.11
    pull_policy: missing
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../apps/host/dist:/srv/host:ro
      - ../apps/sandbox/dist:/srv/sandbox:ro
      - ../apps/protocol/dist:/srv/protocol:ro
      - ./data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_config:
