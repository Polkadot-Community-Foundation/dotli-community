<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dot.li</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0a;
                color: #e0e0e0;
                font-family: system-ui, sans-serif;
            }
            #app {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
            }
            .loading {
                max-width: 480px;
                padding: 2rem;
            }
            .loading h1 {
                font-size: 1.5rem;
                color: #fff;
                margin-bottom: 0.75rem;
            }
            .loading .accent {
                color: #e6007a;
            }
            #status {
                color: #888;
                font-size: 0.95rem;
                line-height: 1.6;
            }
            .spinner {
                width: 24px;
                height: 24px;
                margin: 1rem auto;
                border: 2px solid #333;
                border-top-color: #e6007a;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div class="loading">
                <h1><span class="accent">dot</span>.li</h1>
                <div class="spinner"></div>
                <p id="status">Initializing...</p>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
