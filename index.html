<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dot.li - The decentralized web, in your browser</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <script>
            // Pre-open the shared IndexedDB during HTML parse so it's ready
            // before main.ts executes. Overlaps IDB open (~10-50ms) with
            // module loading. Picked up by src/db.ts via window.__dotliDb.
            window.__dotliDb = new Promise(function(resolve, reject) {
                var req = indexedDB.open("dotli", 1);
                req.onupgradeneeded = function() {
                    var db = req.result;
                    if (!db.objectStoreNames.contains("cids"))
                        db.createObjectStore("cids", { keyPath: "label" });
                    if (!db.objectStoreNames.contains("chains"))
                        db.createObjectStore("chains", { keyPath: "chain" });
                };
                req.onsuccess = function() { resolve(req.result); };
                req.onerror = function() { reject(new Error("IDB open failed")); };
            });
        </script>
        <link rel="preconnect" href="https://paseo-bulletin-collator-node-0.parity-testnet.parity.io" />
        <link rel="preconnect" href="https://paseo-bulletin-collator-node-1.parity-testnet.parity.io" />

        <link rel="preconnect" href="https://asset-hub-paseo-rpc.polkadot.io" />
        <link rel="preconnect" href="https://sys.ibp.network" />

                <span class="topbar-brand">dot<span class="topbar-brand-tld">.li</span></span>

            <div class="topbar-url" id="topbar-url"></div>
            <div class="topbar-right">

                    id="auth-button"
                    class="topbar-btn"

                        width="12"

                        fill="none"

                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- QR Pairing Modal -->
        <div class="auth-modal-backdrop" id="auth-modal-backdrop">
            <div class="auth-modal">
                <h2>Login with Polkadot App</h2>
                <p>Scan the QR code with your Polkadot App to connect</p>
                <div class="auth-modal-qr" id="auth-modal-qr">
                    <div class="spinner"></div>
                </div>
                <button class="auth-modal-close" id="auth-modal-close">
                    Cancel
                </button>
            </div>
        </div>

        <!-- User Popover -->
        <div class="user-popover" id="user-popover">
            <div class="user-popover-name">
                <div class="label">Welcome back</div>
                <div class="name" id="user-popover-username"></div>
            </div>
            <div class="user-popover-divider"></div>
            <button
                class="user-popover-disconnect"
                id="user-popover-disconnect"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Log out
            </button>
        </div>

        <!-- Domain Info Popover -->
        <div class="domain-popover" id="domain-popover">
            <div class="domain-popover-row">
                <span class="domain-popover-label">Status</span>
                <span class="domain-popover-value" id="domain-popover-verification">Pending</span>
            </div>
            <div class="domain-popover-row">
                <span class="domain-popover-label">Owner</span>
                <span
                    class="domain-popover-value loading"
                    id="domain-popover-owner"
                    >Resolving...</span
                >
            </div>
            <div class="domain-popover-row">
                <span class="domain-popover-label">Honor</span>
                <span class="domain-popover-value" id="domain-popover-honor"
                    ><span class="honor-badge unknown">Unknown</span></span
                >
            </div>
        </div>

        <!-- App Content -->
        <div id="app">
            <div class="loading">
                <h1>dot.li</h1>
                <div class="spinner"></div>
                <p id="status">Initializing...</p>
            </div>
        </div>
        <!-- Desktop Download Banner -->
        <div class="toast-card desktop-banner" id="desktop-banner">
            <div class="toast-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
            </div>
            <div class="toast-card-text">
                <a href="https://polkadot.com/get-started/polkadot-for-desktop" target="_blank" rel="noopener">
                    Get Polkadot Desktop
                    <span class="toast-card-subtitle">Full experience with native performance</span>
                </a>
            </div>
            <button class="toast-card-close" id="desktop-banner-close" aria-label="Dismiss">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <script>
            (function () {
                var banner = document.getElementById("desktop-banner");
                // Hide on mobile/tablet — this is a desktop-only feature
                if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    banner.remove();
                    return;
                }
                var dismissed = localStorage.getItem("desktop-banner-dismissed");
                if (dismissed && Math.random() > 0.05) {
                    banner.remove();
                } else {
                    document
                        .getElementById("desktop-banner-close")
                        .addEventListener("click", function () {
                            banner.classList.add("hidden");
                            localStorage.setItem(
                                "desktop-banner-dismissed",
                                "1",
                            );
                            setTimeout(function () {
                                banner.remove();
                            }, 300);
                        });
                }
            })();
        </script>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
