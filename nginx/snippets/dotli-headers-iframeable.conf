# Headers for iframeable origins (the *.app.<domain> and host.<domain> builds).
# Requires `set $csp_ancestors "..."` in the enclosing server/location block.
# nginx replaces, never merges, add_header sets across contexts — every
# location that needs these headers must include this snippet itself.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "frame-ancestors $csp_ancestors" always;
add_header Access-Control-Allow-Origin "*" always;
add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
add_header Access-Control-Allow-Headers "Content-Type" always;
