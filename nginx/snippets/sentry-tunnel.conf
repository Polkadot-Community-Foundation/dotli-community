# /t → single "dotli" Sentry project (host, sandbox and worker all report
# here; the `source` tag on each event distinguishes them inside Sentry).
#
# Name resolution is deferred to request time via `$sentry_upstream` +
# explicit `resolver`. If we used the literal hostname directly in
# `proxy_pass`, nginx would resolve it during `nginx -t` / config load; a
# transient DNS failure at reload time would then abort the reload with
# `host not found in upstream`. With a variable, nginx skips the startup
# lookup and uses the resolver on each request, with a short TTL so IP
# changes propagate quickly. Resolver IPs: Cloudflare + Google public DNS;
# swap for an internal resolver if the host has one.
location = /t {
    limit_except POST { deny all; }
    client_max_body_size 256k;

    resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;
    resolver_timeout 5s;

    set $sentry_upstream "o4511059872841728.ingest.de.sentry.io";
    proxy_pass https://$sentry_upstream/api/4511059878477904/envelope/;
    proxy_ssl_server_name on;
    proxy_set_header Host $sentry_upstream;
    proxy_set_header X-Forwarded-For "";
    proxy_set_header Cookie "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
}
