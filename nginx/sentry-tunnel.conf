# Sentry tunnel — first-party proxy to bypass ad blockers
#
# Include this in each server block (host.dot.li, *.dot.li, *.app.dot.li):
#   include /path/to/sentry-tunnel.conf;
#
# The tunnel accepts Sentry envelopes at /t and forwards them to the
# Sentry ingest endpoint. Ad blockers block requests to *.sentry.io
# but not first-party requests to the same domain.
#
# The DSN is extracted from the envelope header by the client SDK;
# the tunnel just proxies the raw body. We restrict to POST and
# limit body size to prevent abuse.

location = /t {
    # Only accept POST (Sentry envelopes)
    limit_except POST {
        deny all;
    }

    # Cap body size — Sentry envelopes are typically <200KB
    client_max_body_size 256k;

    # Forward to Sentry ingest
    proxy_pass https://o4511059872841728.ingest.de.sentry.io;
    proxy_ssl_server_name on;
    proxy_set_header Host o4511059872841728.ingest.de.sentry.io;

    # Strip identifying headers
    proxy_set_header X-Forwarded-For "";
    proxy_set_header Cookie "";

    # Don't buffer — stream the envelope through
    proxy_buffering off;
    proxy_request_buffering off;

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
}
