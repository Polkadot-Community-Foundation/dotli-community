# dot.li NGINX Configuration
#
# Three-build architecture:
#   host.dot.li    → Shared protocol host (smoldot, shared chain cache)
#   *.dot.li       → Host build (topbar, routing shell, bridge)
#   *.app.dot.li   → App build  (CID from subdomain, P2P fetch, render)
#
# SSL cert must cover: dot.li, *.dot.li, app.dot.li, *.app.dot.li
# (multi-SAN wildcard via DNS-01 challenge)

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=dotli_limit:10m rate=10r/s;

# ── Shared SSL settings (included by all HTTPS blocks) ──────
# Use ssl_certificate / ssl_certificate_key in each server block.
# If using a single cert for all SANs, the paths are the same everywhere.

# ────────────────────────────────────────────────────────────
# HTTP → HTTPS redirects
# ────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name dot.li;
    return 301 https://$server_name$request_uri;
}

server {
    listen 80;
    server_name *.app.dot.li;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name *.dot.li;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name host.dot.li;
    return 301 https://$host$request_uri;
}

# ────────────────────────────────────────────────────────────
# Root domain: dot.li — Landing page
# ────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name dot.li;

    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    root /var/www/dotli/host;
    index index.html;

    include /etc/nginx/snippets/sentry-tunnel.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# App build: *.app.dot.li — CID content fetching & rendering
# ────────────────────────────────────────────────────────────
# Serves the app build which parses the CID from the subdomain,
# fetches content via P2P/gateway, and renders in a sandboxed iframe.
#
# Must be iframeable by host shells (*.dot.li) AND by other app
# contexts (*.app.dot.li) for nested dApp scenarios.

server {
    listen 443 ssl http2;
    server_name *.app.dot.li;

    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    limit_req zone=dotli_limit burst=20 nodelay;

    # Security headers — NO X-Frame-Options (this origin must be iframeable)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow host shells and other app contexts to iframe this origin
    add_header Content-Security-Policy "frame-ancestors dot.li *.dot.li *.app.dot.li" always;

    # CORS for RPC calls
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Pre-compressed files
    brotli_static on;
    gzip_static on;

    root /var/www/dotli/app;
    index index.html;

    include /etc/nginx/snippets/sentry-tunnel.conf;

    # Static assets — long cache, immutable hashes
    location /assets/ {
        try_files $uri =404;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors dot.li *.dot.li *.app.dot.li" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # App service worker — no-cache, broad scope
    location = /app-sw.js {
        try_files $uri =404;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors dot.li *.dot.li *.app.dot.li" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # SPA fallback — all other paths serve app.html
    location / {
        try_files $uri /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# Shared protocol build: host.dot.li — smoldot / shared cache origin
# ────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name host.dot.li;

    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    limit_req zone=dotli_limit burst=20 nodelay;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors dot.li *.dot.li *.app.dot.li" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    brotli_static on;
    gzip_static on;

    root /var/www/dotli/protocol;
    index index.html;

    include /etc/nginx/snippets/sentry-tunnel.conf;

    location /assets/ {
        try_files $uri =404;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors dot.li *.dot.li *.app.dot.li" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}

# ────────────────────────────────────────────────────────────
# Host build: *.dot.li — Shell with topbar, dotns, smoldot
# ────────────────────────────────────────────────────────────
# Serves the host build which resolves .dot names via dotns/smoldot,
# then iframes cid.app.dot.li for content.
#
# NGINX wildcard specificity: *.app.dot.li is more specific than
# *.dot.li, so app subdomains match the block above, not this one.

server {
    listen 443 ssl http2;
    server_name *.dot.li;

    ssl_certificate /etc/letsencrypt/live/dot.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dot.li/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    limit_req zone=dotli_limit burst=20 nodelay;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS for RPC calls
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Pre-compressed files
    brotli_static on;
    gzip_static on;

    root /var/www/dotli/host;

    include /etc/nginx/snippets/sentry-tunnel.conf;

    # Static assets — long cache, immutable hashes
    location /assets/ {
        try_files $uri =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Host PWA service worker — no-cache so the browser always
    # diff-checks the precache manifest on every navigation.
    location = /host-sw.js {
        try_files $uri =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri /index.html;
    }
}
