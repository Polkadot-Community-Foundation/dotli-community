        <script>
            // Pre-open the shared IndexedDB during HTML parse so it's ready
            // before main.ts executes. Overlaps IDB open (~10-50ms) with
            // module loading. Picked up by src/db.ts via window.__dotliDb.
            window.__dotliDb = new Promise(function(resolve, reject) {
                var req = indexedDB.open("dotli", 1);
                req.onupgradeneeded = function() {
                    var db = req.result;
                    if (!db.objectStoreNames.contains("cids"))
                        db.createObjectStore("cids", { keyPath: "label" });
                    if (!db.objectStoreNames.contains("chains"))
                        db.createObjectStore("chains", { keyPath: "chain" });
                };
                req.onsuccess = function() { resolve(req.result); };
                req.onerror = function() { reject(new Error("IDB open failed")); };
            });
        </script>

        <script>
            // Detect environment and set site variant for topbar color
            // dot.li = black, paseo.li = green, anything else = yellow
            (function() {
                var h = location.hostname;
                var isDot = h === "dot.li" || h.endsWith(".dot.li");
                var isPaseo = h === "paseo.li" || h.endsWith(".paseo.li");
                if (isDot) {
                    document.documentElement.setAttribute("data-site", "dot");
                } else if (isPaseo) {
                    document.documentElement.setAttribute("data-site", "paseo");
                } else {
                    document.documentElement.setAttribute("data-site", "local");
                }
            })();

        <script>
            // Logo spinner — rAF-driven for smooth petal cycling
            (function(){
                var petals = document.querySelectorAll('.loading-petal');
                if (!petals.length) return;
                var count = petals.length;
                var cycle = 1400;
                var start = null;
                var raf;
                function tick(ts) {
                    if (!start) start = ts;
                    var p = ((ts - start) % cycle) / cycle;
                    for (var i = 0; i < count; i++) {
                        var dist = p - i / count;
                        if (dist < 0) dist += 1;
                        var b = Math.max(0.15, Math.pow(Math.max(0, 1 - dist * 2.5), 2));
                        petals[i].style.opacity = b;
                        petals[i].style.transform = 'scale(' + (0.92 + 0.08 * b) + ')';
                    }
                    raf = requestAnimationFrame(tick);
                }
                raf = requestAnimationFrame(tick);
                // Stop when loading is replaced
                window.__stopLoadingSpinner = function() { cancelAnimationFrame(raf); };
            })();
            // Underphrase cycling
            (function(){
                var phrases = [
                    "No middleman. Direct from the network.",
                    "Verified by peers, not a company.",
                    "Hosted by people, not servers.",
                    "Private by design.",
                    "No single point of failure."
                ];
                var idx = 0;
                var el = document.getElementById('loading-subtitle');
                var textBlock = document.getElementById('loading-text');
                if (!el || !textBlock) return;
                setInterval(function(){
                    textBlock.classList.add('fade-out');
                    setTimeout(function(){
                        idx = (idx + 1) % phrases.length;
                        el.textContent = phrases[idx];
                        textBlock.classList.remove('fade-out');
                    }, 400);
                }, 6000);
            })();
        </script>
