<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dot.li shared host</title>
    <style>
      html,
      body {
        margin: 0;
        background: #050505;
        color: #e5e5e5;
        font: 12px/1.4 monospace;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .status {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="status">shared protocol host</div>
    <script>
      // Pre-open IndexedDB during HTML parse so chain DB loads instantly
      window.__dotliDb = new Promise(function(resolve, reject) {
        var req = indexedDB.open("dotli", 1);
        req.onupgradeneeded = function() {
          var db = req.result;
          if (!db.objectStoreNames.contains("cids"))
            db.createObjectStore("cids", { keyPath: "label" });
          if (!db.objectStoreNames.contains("chains"))
            db.createObjectStore("chains", { keyPath: "chain" });
        };
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(new Error("IDB open failed")); };
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
